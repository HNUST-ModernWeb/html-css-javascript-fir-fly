<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>个人介绍 | 可编辑保存版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主卡片 */
        .profile-card {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* 头部区域 (简约装饰) */
        .hero-area {
            background: #2c3e66;
            padding: 1.8rem 2rem 0rem 2rem;
            color: white;
            position: relative;
        }

            .hero-area h2 {
                font-weight: 500;
                font-size: 1.6rem;
                opacity: 0.9;
            }

        /* 头像 + 主体 */
        .profile-body {
            padding: 0 2rem 2rem 2rem;
            position: relative;
        }

        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -60px;
            margin-bottom: 1.2rem;
        }

        .avatar-frame {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            background: #fff;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background: #d9e2ef;
        }

        .change-avatar-btn {
            margin-top: 12px;
            background: #f0f2f5;
            border: none;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            color: #1e2a3a;
        }

            .change-avatar-btn:hover {
                background: #e0e4e9;
            }

        /* 可编辑区域样式 (编辑模式高亮) */
        .editable-text {
            outline: none;
            border-radius: 10px;
            transition: 0.1s;
            padding: 0.2rem 0.4rem;
            margin: -0.2rem -0.4rem;
        }

        .edit-mode .editable-text {
            background: rgba(74, 108, 247, 0.15);
            cursor: text;
            box-shadow: 0 0 0 1px #4a6cf7;
        }

            .edit-mode .editable-text:focus {
                background: #fff8e0;
                box-shadow: 0 0 0 2px #ffb347;
            }

        h1 {
            font-size: 2.2rem;
            margin: 0.5rem 0 0.25rem;
            font-weight: 700;
            text-align: center;
        }

        .job-title {
            text-align: center;
            font-size: 1.1rem;
            color: #4a6cf7;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .bio {
            font-size: 1rem;
            line-height: 1.55;
            color: #2c3e50;
            margin: 1rem 0 1.2rem;
            text-align: center;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 0.8rem;
            margin: 1.8rem 0;
            background: #f8fafc;
            padding: 1rem 1.2rem;
            border-radius: 1.5rem;
        }

        .info-item {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 0.95rem;
        }

        .info-icon {
            font-size: 1.3rem;
        }

        .skills {
            margin: 1.5rem 0 2rem;
            text-align: center;
        }

            .skills span {
                display: inline-block;
                background: #eef2ff;
                padding: 0.3rem 1rem;
                border-radius: 40px;
                margin: 0.3rem 0.5rem;
                font-size: 0.85rem;
                font-weight: 500;
            }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 1rem 0 1rem;
        }

        button {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 8px 22px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: #4a6cf7;
            border-color: #4a6cf7;
            color: white;
            box-shadow: 0 2px 6px rgba(74,108,247,0.3);
        }

            .btn-primary:hover {
                background: #2f54eb;
                transform: translateY(-1px);
            }

        .btn-outline:hover {
            background: #eef2ff;
            border-color: #4a6cf7;
        }

        .footer-note {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #5a6e8a;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.2rem;
        }

        @media (max-width: 640px) {
            .profile-body {
                padding: 0 1.2rem 1.5rem;
            }

            h1 {
                font-size: 1.7rem;
            }

            .avatar-frame {
                width: 95px;
                height: 95px;
            }
        }
    </style>
</head>
<body>
    <div class="profile-card" id="profileCard">
        <div class="hero-area">
            <h2>✨ 个人档案</h2>
        </div>
        <div class="profile-body">
            <div class="avatar-section">
                <div class="avatar-frame">
                    <img class="avatar-img" id="avatarImg" src="https://randomuser.me/api/portraits/men/32.jpg" alt="头像">
                </div>
                <button class="change-avatar-btn" id="changeAvatarBtn">🖼️ 更换头像</button>
            </div>

            <!-- 可编辑的核心内容 -->
            <h1><span class="editable-text" id="nameText" contenteditable="false">陆明远</span></h1>
            <div class="job-title"><span class="editable-text" id="titleText" contenteditable="false">全栈开发工程师 / 技术作者</span></div>
            <div class="bio"><span class="editable-text" id="bioText" contenteditable="false">热爱编程与知识分享，拥有6年全栈经验。善于构建优雅的Web应用，相信技术应服务于人。目前专注AI工程化与开发者体验优化。</span></div>

            <div class="info-grid">
                <div class="info-item"><span class="info-icon">📍</span> <span class="editable-text" id="locationText" contenteditable="false">中国 · 上海</span></div>
                <div class="info-item"><span class="info-icon">💼</span> <span class="editable-text" id="workText" contenteditable="false">某独角兽企业 · 技术负责人</span></div>
                <div class="info-item"><span class="info-icon">📧</span> <span class="editable-text" id="emailText" contenteditable="false">mingyuan.lu@tech.me</span></div>
                <div class="info-item"><span class="info-icon">🌐</span> <span class="editable-text" id="webText" contenteditable="false">ming.dev</span></div>
            </div>

            <div class="skills">
                <strong>🧠 技术栈</strong><br />
                <span class="editable-text" id="skill1" contenteditable="false">React/Vue</span>
                <span class="editable-text" id="skill2" contenteditable="false">Node.js/Python</span>
                <span class="editable-text" id="skill3" contenteditable="false">TypeScript</span>
                <span class="editable-text" id="skill4" contenteditable="false">Tailwind/CSS3</span>
                <span class="editable-text" id="skill5" contenteditable="false">数据库设计</span>
            </div>

            <div class="action-buttons">
                <button id="editBtn" class="btn-primary">✏️ 编辑个人信息</button>
                <button id="saveBtn" class="btn-outline" style="display:none;">💾 保存修改</button>
                <button id="resetBtn" class="btn-outline">⟳ 重置默认</button>
            </div>
            <div class="footer-note">
                💡 点击【编辑个人信息】后，文字区域变蓝可修改；修改后点击【保存修改】即可永久保存（自动存储于浏览器）。
            </div>
        </div>
    </div>

    <script>
        // 所有可编辑区域的ID
        const editableFields = ['nameText', 'titleText', 'bioText', 'locationText', 'workText', 'emailText', 'webText', 'skill1', 'skill2', 'skill3', 'skill4', 'skill5'];
        // 默认内容（用于重置）
        const defaultContents = {};
        editableFields.forEach(id => {
            const el = document.getElementById(id);
            if (el) defaultContents[id] = el.innerText;
        });
        const defaultAvatar = "https://randomuser.me/api/portraits/men/32.jpg";

        let isEditMode = false;

        // 切换编辑模式：允许/禁止 contenteditable
        function setEditMode(enable) {
            isEditMode = enable;
            const container = document.getElementById('profileCard');
            if (enable) {
                container.classList.add('edit-mode');
                editableFields.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.contentEditable = "true";
                });
                document.getElementById('editBtn').style.display = 'none';
                document.getElementById('saveBtn').style.display = 'inline-flex';
            } else {
                container.classList.remove('edit-mode');
                editableFields.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.contentEditable = "false";
                });
                document.getElementById('editBtn').style.display = 'inline-flex';
                document.getElementById('saveBtn').style.display = 'none';
            }
        }

        // 保存当前所有内容至 localStorage
        function saveProfile() {
            const profileData = {};
            editableFields.forEach(id => {
                const el = document.getElementById(id);
                if (el) profileData[id] = el.innerText;
            });
            // 保存头像URL
            const avatarUrl = document.getElementById('avatarImg').src;
            profileData.avatarUrl = avatarUrl;
            localStorage.setItem('userProfileData', JSON.stringify(profileData));
            alert('✅ 个人信息已保存！');
            // 保存后自动退出编辑模式
            if (isEditMode) setEditMode(false);
        }

        // 加载保存的数据
        function loadProfile() {
            const saved = localStorage.getItem('userProfileData');
            if (!saved) return;
            try {
                const data = JSON.parse(saved);
                editableFields.forEach(id => {
                    if (data[id] && document.getElementById(id)) {
                        document.getElementById(id).innerText = data[id];
                    }
                });
                if (data.avatarUrl && data.avatarUrl !== "") {
                    document.getElementById('avatarImg').src = data.avatarUrl;
                }
            } catch (e) { console.warn(e); }
        }

        // 重置为默认内容
        function resetToDefault() {
            if (confirm('重置将恢复所有默认文字和默认头像，确定吗？')) {
                editableFields.forEach(id => {
                    if (defaultContents[id] && document.getElementById(id)) {
                        document.getElementById(id).innerText = defaultContents[id];
                    }
                });
                document.getElementById('avatarImg').src = defaultAvatar;
                // 如果是编辑模式则退出编辑
                if (isEditMode) setEditMode(false);
                // 保存重置后的内容
                saveProfile();  // 保存默认内容到storage
                alert('已恢复默认信息并保存。');
            }
        }

        // 更换头像 (支持上传本地文件或网络图片)
        function changeAvatar() {
            const option = prompt('请输入图片网址(https://...) 或者 输入 "upload" 选择本地图片', 'https://randomuser.me/api/portraits/men/32.jpg');
            if (!option) return;
            if (option.toLowerCase() === 'upload') {
                // 创建隐藏文件上传
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function (ev) {
                            document.getElementById('avatarImg').src = ev.target.result;
                            saveProfile();  // 自动保存头像
                            alert('头像已更换并保存');
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            } else if (option.startsWith('http://') || option.startsWith('https://')) {
                document.getElementById('avatarImg').src = option;
                saveProfile();
                alert('头像网址已保存');
            } else {
                alert('请输入正确的图片网址 (http/https) 或输入 "upload" 上传图片');
            }
        }

        // 初始化事件绑定
        function init() {
            loadProfile();            // 加载已保存内容
            document.getElementById('editBtn').addEventListener('click', () => setEditMode(true));
            document.getElementById('saveBtn').addEventListener('click', saveProfile);
            document.getElementById('resetBtn').addEventListener('click', resetToDefault);
            document.getElementById('changeAvatarBtn').addEventListener('click', changeAvatar);
            // 确保保存时退出编辑模式，同时保存内容
        }

        init();
    </script>
</body>
</html>
